name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, xml, sqlite3, pdo_sqlite, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Entorno Laravel (evita warnings por .env / storage ausentes en CI)
        run: |
          cp .env.example .env
          mkdir -p storage/framework/{sessions,views,cache,data} storage/logs bootstrap/cache
          touch storage/logs/laravel.log
          chmod -R ug+rwX storage bootstrap/cache

      - name: Run tests
        env:
          APP_KEY: base64:k8j3vN9xQ2mL5pR7sT1uW4yZ6aB8cD0eF2gH4iJ6kL8mN0oP2qR4sT6uV8wX0yZ2a=
        run: composer test

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    env:
      NUXT_SPROUTKIT_STUB: '1'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: SproutKit stub (vendor real está gitignored)
        run: |
          rm -rf vendor/sproutkit-vue
          mkdir -p vendor
          cp -R ci-stubs/sproutkit-vue vendor/sproutkit-vue

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  deploy-backend:
    name: Deploy backend (EC2)
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          HOST: ${{ vars.DEPLOY_BACKEND_HOST }}
          USER: ${{ vars.DEPLOY_BACKEND_USER }}
          ROOT: ${{ vars.DEPLOY_CHALLENGE_ROOT }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ] || [ -z "${HOST:-}" ] || [ -z "${USER:-}" ] || [ -z "${ROOT:-}" ]; then
            echo "::notice::CD omitido: configura secret DEPLOY_SSH_PRIVATE_KEY y vars DEPLOY_BACKEND_HOST, DEPLOY_BACKEND_USER, DEPLOY_CHALLENGE_ROOT"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" \
            "export CHALLENGE_ROOT=$(printf '%q' "$ROOT") DEPLOY_BRANCH=$(printf '%q' "$BRANCH"); bash -s" \
            < scripts/ec2/deploy-backend.sh

  deploy-frontend:
    name: Deploy frontend (EC2)
    needs: [backend, frontend]
    if: >
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      && vars.DEPLOY_FRONTEND_HOST != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          HOST: ${{ vars.DEPLOY_FRONTEND_HOST }}
          USER: ${{ vars.DEPLOY_FRONTEND_USER || vars.DEPLOY_BACKEND_USER }}
          ROOT: ${{ vars.DEPLOY_CHALLENGE_ROOT }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ] || [ -z "${HOST:-}" ] || [ -z "${USER:-}" ] || [ -z "${ROOT:-}" ]; then
            echo "::error::Faltan secret o variables para desplegar el frontend."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" \
            "export CHALLENGE_ROOT=$(printf '%q' "$ROOT") DEPLOY_BRANCH=$(printf '%q' "$BRANCH"); bash -s" \
            < scripts/ec2/deploy-frontend.sh
