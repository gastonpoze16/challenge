name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, xml, sqlite3, pdo_sqlite, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        env:
          APP_KEY: base64:k8j3vN9xQ2mL5pR7sT1uW4yZ6aB8cD0eF2gH4iJ6kL8mN0oP2qR4sT6uV8wX0yZ2a=
        run: composer test

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: SproutKit stub (vendor real está gitignored)
        run: |
          rm -rf vendor/sproutkit-vue
          mkdir -p vendor
          cp -R ci-stubs/sproutkit-vue vendor/sproutkit-vue

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test
